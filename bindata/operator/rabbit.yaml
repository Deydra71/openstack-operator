apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: rabbitmq-operator
    app.kubernetes.io/name: rabbitmq-cluster-operator
    app.kubernetes.io/part-of: rabbitmq
  name: rabbitmq-cluster-operator-manager
  namespace: {{ .RabbitmqOperator.Namespace }}
spec:
  replicas: {{ .RabbitmqOperator.Deployment.Replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq-cluster-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/component: rabbitmq-operator
        app.kubernetes.io/name: rabbitmq-cluster-operator
        app.kubernetes.io/part-of: rabbitmq
    spec:
      containers:
      - command:
        - /manager
        env:
        - name: OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
{{- range .RabbitmqOperator.Deployment.Manager.Env }}
        - name: '{{ .Name }}'
          value: '{{ .Value }}'
{{- end }}
        image: {{ .RabbitmqOperator.Deployment.Manager.Image }}
        name: operator
        ports:
        - containerPort: 9782
          name: metrics
          protocol: TCP
        resources:
          limits:
{{- if .CPU }}
            cpu: {{ .CPU }}
{{- end }}
{{- if .Memory }}
            memory: {{ .Memory }}
{{- end }}
{{- end }}
{{- end }}
{{- with .Requests }}
{{- if or .CPU .Memory }}
          requests:
{{- if .CPU }}
            cpu: {{ .CPU }}
{{- end }}
{{- if .Memory }}
            memory: {{ .Memory }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
      serviceAccountName: rabbitmq-cluster-operator-controller-manager
      terminationGracePeriodSeconds: 10
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 120
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 120
