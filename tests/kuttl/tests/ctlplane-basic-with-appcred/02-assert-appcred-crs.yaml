apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      NS=$NAMESPACE

      oc wait appcred ac-barbican -n "$NS" --for=condition=Ready --timeout=120s

      EXP=$(oc get appcred ac-barbican -n "$NS" \
        -o jsonpath='{.spec.expirationDays}')
      [ "$EXP" -eq 200 ] || exit 1

      GRP=$(oc get appcred ac-barbican -n "$NS" \
        -o jsonpath='{.spec.gracePeriodDays}')
      [ "$GRP" -eq 90 ] || exit 1

      ROL=$(oc get appcred ac-barbican -n "$NS" \
        -o jsonpath='{.spec.roles[*]}')
      case " $ROL " in *" service "*) ;; *) exit 1;; esac

      # Default missing unrestricted → false
      UNR=$(oc get appcred ac-barbican -n "$NS" \
        -o jsonpath='{.spec.unrestricted}' 2>/dev/null || echo "")
      UNR=${UNR:-false}
      [ "$UNR" = "false" ] || exit 1

      oc wait appcred ac-cinder -n "$NS" --for=condition=Ready --timeout=120s

      EXP=$(oc get appcred ac-cinder -n "$NS" \
        -o jsonpath='{.spec.expirationDays}')
      [ "$EXP" -eq 10 ] || exit 1

      GRP=$(oc get appcred ac-cinder -n "$NS" \
        -o jsonpath='{.spec.gracePeriodDays}')
      [ "$GRP" -eq 5 ] || exit 1

      ROL=$(oc get appcred ac-cinder -n "$NS" \
        -o jsonpath='{.spec.roles[*]}')
      case " $ROL " in *" admin "*) ;; *) exit 1;; esac
      case " $ROL " in *" service "*) ;; *) exit 1;; esac

      UNR=$(oc get appcred ac-cinder -n "$NS" \
        -o jsonpath='{.spec.unrestricted}' 2>/dev/null || echo "")
      [ "$UNR" = "true" ] || exit 1
